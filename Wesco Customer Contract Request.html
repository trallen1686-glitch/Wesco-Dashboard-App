<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wesco Customer Contract Request</title>
  <style>
    :root { --navy:#173c58; --blue:#2875bb; --red:#7b1f31; --ink:#17232d; --line:#cbd5de; --soft:#eef4f8; --page:#edf1f4; font-family:Arial,Helvetica,sans-serif; color:var(--ink); background:var(--page); }
    * { box-sizing:border-box; }
    body { margin:0; }
    main { width:min(920px,calc(100% - 32px)); margin:32px auto; padding:42px 48px 48px; background:#fff; border:1px solid #dbe2e8; box-shadow:0 12px 34px rgba(23,60,88,.12); }
    header { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; padding-bottom:22px; border-bottom:4px solid var(--navy); }
    .logo { width:210px; height:auto; display:block; }
    .title { text-align:right; }
    h1 { margin:5px 0 4px; color:var(--navy); font-size:30px; line-height:1.1; letter-spacing:0; }
    .subtitle { margin:0; color:var(--blue); font-size:17px; font-weight:700; }
    .notice { margin:24px 0; padding:14px 16px; color:var(--navy); background:var(--soft); border-left:4px solid var(--blue); font-weight:700; line-height:1.4; }
    fieldset { margin:0; padding:0; border:0; }
    legend { width:100%; margin-bottom:14px; color:var(--navy); font-size:19px; font-weight:700; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:17px 20px; }
    .field { min-width:0; }
    .field.wide { grid-column:1 / -1; }
    label { display:block; margin-bottom:7px; color:var(--navy); font-size:14px; font-weight:700; }
    .required { color:var(--red); }
    input,textarea { width:100%; min-height:44px; padding:10px 12px; border:1px solid #aebdca; border-radius:4px; background:#fff; color:var(--ink); font:inherit; }
    textarea { min-height:96px; resize:vertical; line-height:1.45; }
    input:focus,textarea:focus { outline:3px solid rgba(40,117,187,.2); border-color:var(--blue); }
    .preview-wrap { margin-top:30px; padding-top:26px; border-top:1px solid var(--line); }
    .preview-wrap h2 { margin:0 0 14px; color:var(--blue); font-size:19px; letter-spacing:0; }
    #emailPreview { padding:18px; background:#f8fafb; border:1px solid var(--line); line-height:1.55; white-space:pre-wrap; }
    .actions { display:flex; align-items:center; justify-content:flex-end; gap:14px; margin-top:24px; }
    button { min-height:46px; padding:0 24px; border:0; border-radius:4px; background:var(--navy); color:#fff; font:inherit; font-weight:700; cursor:pointer; }
    button:hover { background:#0f3048; }
    button:focus-visible { outline:3px solid rgba(40,117,187,.35); outline-offset:3px; }
    #status { min-height:22px; color:#246b3e; font-weight:700; }
    @media (max-width:680px) {
      main { width:100%; margin:0; padding:24px 18px 30px; border:0; box-shadow:none; }
      header { align-items:center; }
      .logo { width:155px; }
      h1 { font-size:23px; }
      .subtitle { font-size:14px; }
      .form-grid { grid-template-columns:1fr; }
      .field.wide { grid-column:auto; }
      .actions { align-items:stretch; flex-direction:column; }
      button { width:100%; }
    }
    @media print {
      :root { background:#fff; }
      main { width:100%; margin:0; padding:24px; border:0; box-shadow:none; }
      .actions { display:none; }
    }
  </style>
<!-- WESCO-DARK-THEME:START -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

:root {
  --wesco-orange: #F36A00;
  --wesco-orange-light: #FF9A4D;
  --wesco-page: #080D10;
  --wesco-panel: rgba(9, 14, 16, 0.74);
  --wesco-panel-solid: rgba(5, 10, 12, 0.88);
  --wesco-border: rgba(255, 255, 255, 0.14);
  --wesco-text: #FFFFFF;
  --wesco-text-soft: rgba(255, 255, 255, 0.82);
  --wesco-font: 'Open Sans', sans-serif;
  --page-bg: var(--wesco-page) !important;
  --card-bg: var(--wesco-panel) !important;
  --border: var(--wesco-border) !important;
  --ink: var(--wesco-text) !important;
  --ink-soft: var(--wesco-text-soft) !important;
  --blue: var(--wesco-orange) !important;
  --blue-bright: var(--wesco-orange) !important;
  --maroon: var(--wesco-orange) !important;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  min-height: 100%;
  margin: 0;
  color: var(--wesco-text) !important;
  font-family: var(--wesco-font) !important;
  background-color: var(--wesco-page) !important;
  background-image:
    linear-gradient(115deg, rgba(6,10,12,.96) 0%, rgba(9,14,16,.82) 42%, rgba(9,14,16,.94) 100%),
    radial-gradient(circle at 72% 18%, rgba(243,106,0,.10), transparent 32%),
    repeating-linear-gradient(90deg, transparent 0 79px, rgba(255,255,255,.018) 80px),
    repeating-linear-gradient(0deg, transparent 0 79px, rgba(255,255,255,.014) 80px) !important;
  background-attachment: fixed !important;
}

body, button, input, textarea, select, option, table {
  font-family: var(--wesco-font) !important;
}

body > main, body > .widget, body > .container, body > .wrapper,
.page-shell, .dashboard-shell {
  width: 100% !important;
  max-width: 1280px !important;
  margin: 0 auto !important;
  padding: 18px !important;
}

.card, .panel, .widget-card, .dashboard-card, .person-card,
.tab-tile, .tile, .quick-tool-chip, .modal-content, .dropdown-menu,
.field, .form-section, .attach-item, .bid-card, .list-card, .stat-card {
  color: var(--wesco-text) !important;
  background: var(--wesco-panel) !important;
  border-color: var(--wesco-border) !important;
  border-radius: 4px !important;
  box-shadow: 0 12px 30px rgba(0,0,0,.30) !important;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

header, .header, .page-header, .dashboard-header,
.starter-header, .messages-header {
  color: var(--wesco-text) !important;
  background: rgba(4,8,10,.62) !important;
  border-color: var(--wesco-border) !important;
  border-bottom: 2px solid var(--wesco-orange) !important;
}

h1, h2, h3, h4, h5, h6, .title, .person-name,
.starter-name, .tab-label, .card-title {
  color: var(--wesco-text) !important;
}

p, label, small, .subtitle, .helper-text, .muted, .contact-preview {
  color: var(--wesco-text-soft) !important;
}

a, .back-link, .section-heading, .role-section-title, .section-label {
  color: var(--wesco-orange) !important;
}

.back-link {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.card b, .tile b, .tool-card b {
  color: var(--wesco-orange-light) !important;
}

.tab-desc, .tile-description, .card-description, .page-description {
  color: var(--wesco-orange-light) !important;
}

button, .btn, input[type='button'], input[type='submit'] {
  color: #FFFFFF !important;
  background: var(--wesco-orange) !important;
  border: 1px solid var(--wesco-orange) !important;
  border-radius: 3px !important;
}

button:hover, .btn:hover, input[type='button']:hover, input[type='submit']:hover {
  background: #FF7A14 !important;
}

input:not([type='button']):not([type='submit']), textarea, select {
  color: var(--wesco-text) !important;
  background: rgba(3,7,9,.78) !important;
  border: 1px solid var(--wesco-border) !important;
}

input::placeholder, textarea::placeholder {
  color: rgba(255,255,255,.48) !important;
}

table, th, td {
  color: var(--wesco-text) !important;
  border-color: var(--wesco-border) !important;
}

th {
  color: var(--wesco-orange-light) !important;
  background: rgba(4,8,10,.66) !important;
}

tr:hover td { background: rgba(243,106,0,.08) !important; }

/* Keep initials and job descriptions, but remove their small boxes. */
.avatar, .initials, .staff-initials {
  color: var(--wesco-orange-light) !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.tag, .role-tag, .job-title, .job-description {
  color: var(--wesco-orange-light) !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

/* Preserve all Wesco logo colors. */
img.logo, .logo img, .brand img, .branding img {
  filter: none !important;
  opacity: 1 !important;
  mix-blend-mode: normal !important;
}

@media (max-width: 600px) {
  body > main, body > .widget, body > .container, body > .wrapper,
  .page-shell, .dashboard-shell { padding: 8px !important; }
}
</style>
<!-- WESCO-DARK-THEME:END -->
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;z-index:9999;background:#102b3d;color:#fff;font:700 11px Arial,sans-serif;padding:7px 12px;border-radius:20px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.25)">&#8592; Wesco Hub</a>
  <main>
    <header>
      <img class="logo" src="Wesco Logo 2.png" alt="Wesco Exteriors, Inc.">
      <div class="title">
        <h1>Wesco, Inc.</h1>
        <p class="subtitle">CUSTOMER CONTRACT REQUEST</p>
      </div>
    </header>

    <p class="notice">Complete all required project and recipient details. Enter N/A when information is not available.</p>

    <form id="contractForm">
      <fieldset>
        <legend>Project Details</legend>
        <div class="form-grid">
          <div class="field">
            <label for="propertyName">Property Name <span class="required">*</span></label>
            <input id="propertyName" name="propertyName" required placeholder="Property name">
          </div>
          <div class="field">
            <label for="estimateNumber">QB Estimate # <span class="required">*</span></label>
            <input id="estimateNumber" name="estimateNumber" required placeholder="#XXXX">
          </div>
          <div class="field">
            <label for="customer">Customer <span class="required">*</span></label>
            <input id="customer" name="customer" required placeholder="Customer or company name">
          </div>
          <div class="field">
            <label for="contractValue">Contract Value <span class="required">*</span></label>
            <input id="contractValue" name="contractValue" required inputmode="decimal" placeholder="$0.00">
          </div>
          <div class="field wide">
            <label for="scope">Scope of Work <span class="required">*</span></label>
            <textarea id="scope" name="scope" required placeholder="Brief description, such as siding replacement or roofing repairs"></textarea>
          </div>
          <div class="field">
            <label for="startTimeline">Est Start Timeline</label>
            <input id="startTimeline" name="startTimeline" placeholder="If known, otherwise N/A">
          </div>
          <div class="field">
            <label for="completeTimeline">Est Complete Timeline</label>
            <input id="completeTimeline" name="completeTimeline" placeholder="If known, otherwise N/A">
          </div>
        </div>
      </fieldset>

      <fieldset style="margin-top:26px">
        <legend>Contract Recipient</legend>
        <div class="form-grid">
          <div class="field">
            <label for="recipient">Recipient <span class="required">*</span></label>
            <input id="recipient" name="recipient" required placeholder="Recipient name">
          </div>
          <div class="field">
            <label for="recipientEmail">Email <span class="required">*</span></label>
            <input id="recipientEmail" name="recipientEmail" type="email" required placeholder="name@example.com">
          </div>
        </div>
      </fieldset>

      <section class="preview-wrap" aria-labelledby="previewHeading">
        <h2 id="previewHeading">EMAIL BODY</h2>
        <div id="emailPreview" aria-live="polite"></div>
      </section>

      <div class="actions">
        <span id="status" role="status" aria-live="polite"></span>
        <button type="submit">Submit</button>
      </div>
    </form>
  </main>

  <script>
    const form = document.getElementById('contractForm');
    const preview = document.getElementById('emailPreview');
    const status = document.getElementById('status');
    const value = (id, fallback) => document.getElementById(id).value.trim() || fallback;

    function buildEmail() {
      const property = value('propertyName', '[PROPERTY NAME]');
      const estimate = value('estimateNumber', '[QB ESTIMATE #]');
      const customer = value('customer', '[CUSTOMER]');
      const contractValue = value('contractValue', '[CONTRACT VALUE]');
      const scope = value('scope', '[BRIEF DESCRIPTION]');
      const start = value('startTimeline', 'N/A');
      const complete = value('completeTimeline', 'N/A');
      const recipient = value('recipient', '[NAME]');
      const email = value('recipientEmail', '[EMAIL ADDRESS]');

      return `Customer Contract Request:\n\nHi Stephanie,\n\nCan you please reach out to request and execute a contract for the following project? I've attached the final estimate to be sent with your request. Below are the details:\n\nProperty Name: ${property}\nQB Estimate #: ${estimate}\nCustomer: ${customer}\nContract Value: ${contractValue}\n\nScope of Work: ${scope}\n\nEst Start Timeline: ${start}\n\nEst Complete Timeline: ${complete}\n\nPlease send the contract request to:\n\nRecipient: ${recipient}\nEmail: ${email}`;
    }

    function refreshPreview() {
      preview.textContent = buildEmail();
      status.textContent = '';
    }

    form.addEventListener('input', refreshPreview);
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!form.reportValidity()) return;
      const text = buildEmail();
      try {
        await navigator.clipboard.writeText(text);
        status.textContent = 'Submitted. Email body copied to clipboard.';
      } catch {
        const range = document.createRange();
        range.selectNodeContents(preview);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        status.textContent = 'Submitted. Email body selected for copying.';
      }
    });

    refreshPreview();
  </script>
</body>
</html>
